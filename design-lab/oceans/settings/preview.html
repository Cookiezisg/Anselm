<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forgify — 设置·概览(参考 Codex Profile,换 Forgify 皮)</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<link rel="stylesheet" href="../../shared/shell.css">
<script src="../../shared/icons.js"></script>
<style>
  /* 布局参考 Codex Profile 页;皮肤=Forgify 真实 tokens(系统字/白·近黑/海岸线/accent)。
     本地单用户改写:无 @handle/Plus/Share;统计=对话/锻造/运行/连续;插件→最常用实体。调性预览,非最终结构。 */
  body { padding: 22px; }
  .win { height: auto; min-height: 680px; max-width: 1060px; margin: 0 auto; flex-direction: row; gap: var(--s2); padding: var(--s2); }

  /* 左：设置导航岛(返回 + 搜索 + 分组类目) */
  .snav { flex: none; width: 232px; display: flex; flex-direction: column; background: var(--cc-side); border: 1px solid var(--line);
    border-radius: var(--r-card); box-shadow: var(--shadow-island); padding: 10px 8px; overflow-y: auto; }
  .bk { display: flex; align-items: center; gap: 7px; height: 30px; padding: 0 8px; border-radius: 8px; color: var(--ink-2); font-size: var(--t-md); }
  .bk:hover { background: var(--cc-hover); color: var(--ink); }
  .bk svg { width: 16px; height: 16px; }
  .nsearch { display: flex; align-items: center; gap: 8px; height: 32px; margin: 8px 4px 10px; padding: 0 9px; border: 1px solid var(--line); border-radius: 9px; color: var(--ink-3); }
  .nsearch svg { width: 15px; height: 15px; flex: none; }
  .nsearch input { flex: 1; min-width: 0; border: 0; background: transparent; font: inherit; font-size: var(--t-md); color: var(--ink); }
  .nsearch input::placeholder { color: var(--ink-3); }
  .ngrp { padding: 10px 10px 4px; font-size: var(--t-xs); font-weight: 600; color: var(--ink-3); letter-spacing: .02em; }
  .ni { display: flex; align-items: center; gap: 10px; height: 32px; padding: 0 10px; border-radius: 8px; color: var(--ink-2); font-size: var(--t-md); }
  .ni:hover { background: var(--cc-hover); color: var(--ink); }
  .ni.on { background: var(--cc-active); color: var(--ink); font-weight: 500; }
  .ni .d { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-3); flex: none; opacity: .55; }
  .ni.on .d { background: var(--accent); opacity: 1; }

  /* 右：概览主区(铺在海上) */
  .main { flex: 1; min-width: 0; background: var(--cc-win); border-radius: var(--r-card); overflow-y: auto; }
  .topbar { display: flex; align-items: center; justify-content: space-between; height: 52px; padding: 0 26px; }
  .topbar .ttl { font-size: var(--t-lg); font-weight: 600; color: var(--ink); }
  .topbar .edit { display: flex; align-items: center; gap: 6px; height: 30px; padding: 0 11px; border: 1px solid var(--line); border-radius: 8px; color: var(--ink-2); font-size: var(--t-sm); }
  .topbar .edit:hover { background: var(--cc-hover); color: var(--ink); }
  .topbar .edit svg { width: 14px; height: 14px; }

  .body { display: flex; flex-direction: column; align-items: center; padding: 14px 40px 44px; gap: var(--s6); }
  .body > * { width: 100%; max-width: 720px; }

  .hero { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .hero .av { width: 80px; height: 80px; border-radius: 50%; display: grid; place-items: center; background: var(--accent-soft); color: var(--accent); font-size: 30px; font-weight: 600; }
  .hero .nm { font-size: 24px; font-weight: 600; color: var(--ink); margin-top: 12px; letter-spacing: -.01em; }
  .hero .sub { font-size: var(--t-md); color: var(--ink-3); }

  /* 统计卡:一座岛,5 项靠留白分(无竖线) */
  .statbar { display: flex; background: var(--cc-side); border: 1px solid var(--line); border-radius: var(--r-card); box-shadow: var(--shadow-island); padding: 18px 8px; }
  .statbar .st { flex: 1; text-align: center; padding: 0 6px; }
  .statbar .st .num { font-size: 21px; font-weight: 600; color: var(--ink); letter-spacing: -.01em; }
  .statbar .st .lab { font-size: var(--t-sm); color: var(--ink-3); margin-top: 4px; }

  /* 活动热力图 */
  .actv .hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .actv .hd .t { font-size: var(--t-lg); font-weight: 600; color: var(--ink); }
  .actv .tog { display: flex; gap: 16px; font-size: var(--t-md); }
  .actv .tog span { color: var(--ink-3); cursor: pointer; }
  .actv .tog span.on { color: var(--ink); font-weight: 500; }
  .grid { display: flex; gap: 3px; }
  .col { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .c { aspect-ratio: 1; border-radius: 3px; background: var(--island-3); }
  .months { display: flex; margin-top: 6px; font-size: var(--t-xs); color: var(--ink-3); }

  /* 下方两栏 */
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s8); }
  .cols h3 { font-size: var(--t-lg); font-weight: 600; color: var(--ink); margin: 0 0 12px; }
  .irow { display: flex; align-items: center; justify-content: space-between; height: 34px; font-size: var(--t-md); }
  .irow .k { color: var(--ink-2); } .irow .v { color: var(--ink); }
  .erow { display: flex; align-items: center; gap: 10px; height: 38px; }
  .erow .ei { width: 26px; height: 26px; flex: none; border-radius: 7px; display: grid; place-items: center; background: var(--island-3); color: var(--ink-2); }
  .erow .ei svg { width: 16px; height: 16px; }
  .erow .nm { flex: 1; min-width: 0; font-size: var(--t-md); color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .erow .nm em { color: var(--ink-3); font-style: normal; font-size: var(--t-sm); margin-left: 6px; }
  .erow .ct { font-size: var(--t-sm); color: var(--ink-3); }
</style>
</head>
<body>
  <div class="win">
    <nav class="snav">
      <a class="bk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m15 6-6 6 6 6"/></svg>返回 Forgify</a>
      <div class="nsearch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="搜索设置…"></div>
      <div class="ngrp">个人化</div>
      <div class="ni on"><span class="d"></span>概览</div>
      <div class="ni"><span class="d"></span>通用</div>
      <div class="ni"><span class="d"></span>外观与语言</div>
      <div class="ngrp">模型</div>
      <div class="ni"><span class="d"></span>模型与密钥</div>
      <div class="ni"><span class="d"></span>搜索与嵌入</div>
      <div class="ngrp">集成</div>
      <div class="ni"><span class="d"></span>连接器 MCP</div>
      <div class="ni"><span class="d"></span>运行时与磁盘</div>
      <div class="ngrp">系统</div>
      <div class="ni"><span class="d"></span>工作区</div>
      <div class="ni"><span class="d"></span>通知</div>
      <div class="ni"><span class="d"></span>关于</div>
    </nav>

    <section class="main">
      <div class="topbar">
        <span class="ttl">概览</span>
        <a class="edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>编辑</a>
      </div>
      <div class="body">
        <div class="hero">
          <div class="av">P</div>
          <div class="nm">Personal</div>
          <div class="sub">本地工作区 · 自 2026-01-03 · 活跃 142 天</div>
        </div>

        <div class="statbar">
          <div class="st"><div class="num">28.3m</div><div class="lab">累计 Token</div></div>
          <div class="st"><div class="num">1,284</div><div class="lab">对话</div></div>
          <div class="st"><div class="num">47</div><div class="lab">锻造实体</div></div>
          <div class="st"><div class="num">6 天</div><div class="lab">当前连续</div></div>
          <div class="st"><div class="num">23 天</div><div class="lab">最长连续</div></div>
        </div>

        <div class="actv">
          <div class="hd"><span class="t">活动</span><div class="tog"><span class="on">每日</span><span>每周</span><span>累计</span></div></div>
          <div class="grid" id="grid"></div>
          <div class="months" id="months"></div>
        </div>

        <div class="cols">
          <div>
            <h3>活动洞察</h3>
            <div class="irow"><span class="k">最常用模型</span><span class="v">claude-opus-4-8</span></div>
            <div class="irow"><span class="k">默认模式</span><span class="v">标准 · 92%</span></div>
            <div class="irow"><span class="k">探索 / 已用技能</span><span class="v">5 / 7</span></div>
            <div class="irow"><span class="k">平均对话时长</span><span class="v">12 分钟</span></div>
            <div class="irow"><span class="k">最长运行</span><span class="v">28 分 37 秒</span></div>
          </div>
          <div>
            <h3>最常用实体</h3>
            <div id="ents"></div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <script>
    (function () {
      const grid = document.getElementById('grid'), months = document.getElementById('months');
      const cols = 40, fills = ['var(--island-3)', 'rgba(0,113,227,.28)', 'rgba(0,113,227,.5)', 'rgba(0,113,227,.74)', 'rgba(0,113,227,.98)'];
      for (let w = 0; w < cols; w++) {
        const col = document.createElement('div'); col.className = 'col';
        for (let d = 0; d < 7; d++) {
          const c = document.createElement('div'); c.className = 'c';
          const r = Math.random(), wknd = (d === 0 || d === 6);
          let lvl = r > (wknd ? 0.62 : 0.34) ? 1 + Math.floor(Math.random() * 4) : 0;
          if (w < 4 && Math.random() > 0.45) lvl = 0;
          c.style.background = fills[lvl];
          col.appendChild(c);
        }
        grid.appendChild(col);
      }
      ['7月', '8月', '9月', '10月', '11月', '12月', '1月', '2月', '3月', '4月', '5月', '6月'].forEach(m => {
        const s = document.createElement('span'); s.textContent = m; s.style.flex = '1'; months.appendChild(s);
      });
      const ENTS = [['Researcher', 'agent', 'agent', 312], ['fetch_news', 'function', 'function', 188], ['daily-digest', 'workflow', 'workflow', 142], ['inbox', 'handler', 'handler', 96], ['每早 6 点', 'trigger', 'trigger', 61]];
      document.getElementById('ents').innerHTML = ENTS.map(([nm, ic, ty, ct]) =>
        `<div class="erow"><span class="ei">${icon(ic, 16)}</span><span class="nm">${nm}<em>${ty}</em></span><span class="ct">${ct} 次</span></div>`).join('');
    })();
  </script>
</body>
</html>
