<!doctype html>
<html lang="zh" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forgify · Design Lab</title>
<link rel="stylesheet" href="shared/tokens.css">
<link rel="stylesheet" href="shared/base.css">
<style>
  body { padding: 48px 24px; }
  .wrap { max-width: 880px; margin: 0 auto; }
  .hero { margin-bottom: 40px; }
  .hero .mark { width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; color: #fff;
    background: linear-gradient(135deg, var(--accent), #9b5de5); margin-bottom: 16px; }
  .hero h1 { font-size: 32px; font-weight: 700; letter-spacing: -.02em; margin: 0 0 8px; }
  .hero p { color: var(--ink-2); font-size: 15px; max-width: 620px; margin: 0; }
  .sect { font-size: 12px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .05em; margin: 32px 0 12px; }
  a.demo { text-decoration: none; color: inherit; }
  .demo .ch b { font-size: 15px; }
  .tag-soon { font-size: 11px; color: var(--warn); font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="mark"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6Z"/><path d="m9 12 2 2 4-4"/></svg></div>
    <h1>Forgify · Design Lab</h1>
    <p>交互形态 + 产品哲学的发散场。这里的 demo <b>不连后端</b>，只用来把「做成什么样」聊清楚——形态定了再统一落 Flutter。</p>
  </div>

  <div class="sect">Demos</div>
  <div class="grid" id="demos"></div>

  <div class="sect">读我</div>
  <div class="grid">
    <a class="demo" href="PHILOSOPHY.md"><div class="card"><div class="ch"><span class="ei etype workflow"></span><b>PHILOSOPHY.md</b></div><div class="desc">产品哲学：海与岛、信号交互、Apple 化 B 端视觉、四导航。</div></div></a>
    <a class="demo" href="README.md"><div class="card"><div class="ch"><span class="ei etype handler"></span><b>README.md</b></div><div class="desc">这个文件夹是什么、怎么看、和 Flutter 的关系。</div></div></a>
  </div>
</div>

<script src="shared/mock-data.js"></script>
<script>
const DEMOS = [
  { href: 'demos/main-shell.html', kind: 'agent', name: '主屏：海与岛 + 信号交互', desc: '四导航动效 · 聊天 · AI 调工具时实体卡从右流式展开。', soon: false },
  { href: 'demos/onboarding.html', kind: 'function', name: 'Onboarding 向导', desc: '首启配置：主题 / 语言 → 大模型与搜索 API Key。', soon: false },
];
document.getElementById('demos').innerHTML = DEMOS.map(d => `
  <a class="demo" href="${d.href}"><div class="card">
    <div class="ch"><span class="ei etype ${d.kind}">${icon(d.kind,16)}</span><b>${d.name}</b>
      ${d.soon ? '<span class="tag-soon">即将</span>' : ''}</div>
    <div class="desc">${d.desc}</div>
  </div></a>`).join('');
document.querySelectorAll('.etype.workflow.ei')[0]?.insertAdjacentHTML('beforeend', icon('sparkle',15));
document.querySelectorAll('.etype.handler.ei')[0]?.insertAdjacentHTML('beforeend', icon('docs',15));
</script>
</body>
</html>
