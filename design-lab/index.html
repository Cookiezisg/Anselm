<!doctype html>
<html lang="zh" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forgify · Design Lab</title>
<link rel="stylesheet" href="shared/tokens.css">
<link rel="stylesheet" href="shared/base.css">
<style>
  body { padding: 48px 24px; }
  .wrap { max-width: 880px; margin: 0 auto; }
  .hero { margin-bottom: 40px; }
  .hero .mark { width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; color: #fff;
    background: linear-gradient(135deg, var(--accent), #9b5de5); margin-bottom: 16px; }
  .hero h1 { font-size: 32px; font-weight: 700; letter-spacing: -.02em; margin: 0 0 8px; }
  .hero p { color: var(--ink-2); font-size: 15px; max-width: 620px; margin: 0; }
  .sect { font-size: 12px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .05em; margin: 32px 0 12px; }
  a.demo { text-decoration: none; color: inherit; }
  .demo .ch b { font-size: 15px; }
  .tag-soon { font-size: 11px; color: var(--warn); font-weight: 600; }
  /* 统一图标 chip 为中性灰(盖掉旧渐变),贴合当前干净/少强调色调性;所有 kind 都可见 */
  .card .ch .ei { background: var(--island-3); color: var(--ink-2); }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="mark"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6Z"/><path d="m9 12 2 2 4-4"/></svg></div>
    <h1>Forgify · Design Lab</h1>
    <p>交互形态 + 产品哲学的发散场。这里的 demo <b>不连后端</b>，只用来把「做成什么样」聊清楚——形态定了再统一落 Flutter。</p>
  </div>

  <div class="sect">海洋 · 形态 demos</div>
  <div class="grid" id="demos"></div>

  <div class="sect">读我</div>
  <div class="grid" id="reads"></div>
</div>

<script src="shared/mock-data.js"></script>
<script>
// 入口画廊：海洋/形态 demos + 读我。加海洋只在此加一行（CONTRIBUTING §四：唯一需内核串行合的共享触点）。
const DEMOS = [
  { href: 'app.html',                       kind: 'sparkle',  name: 'Forgify · 完整 app（打通）', desc: '一页串起全系统:四 tab 切海洋(Chat/Documents/Entities/Scheduler,海面+侧栏联动) · 点头像进设置 · 返回回到来源海洋。从这里看整体。' },
  { href: 'oceans/chat/chat.html',          kind: 'chat',     name: 'Chat 海洋（单页）',        desc: '外壳 + 侧栏 + Chat 海洋 · 海与岛靠海岸线分 · AI 调工具时右岛实体卡从右流式编辑。' },
  { href: 'oceans/documents/documents.html',kind: 'docs',     name: '文档海洋',               desc: 'WYSIWYG markdown 文档页 · 零横线靠海岸线分区 · 选段唤起内联 AI（:iterate）· 大纲/反链右岛。' },
  { href: 'oceans/settings/settings.html', kind: 'settings', name: '设置（接进主界面 · 齿轮触发）', desc: '底部齿轮接管海面 · 左分组类目(概览/通用/模型密钥/搜索/连接器/运行时/工作区/通知/关于) + 概览(身份/统计/活动热力图/最常用实体)。' },
  { href: 'onboarding/onboarding.html',     kind: 'function', name: 'Onboarding 向导',        desc: '首启配置：主题 / 语言 → 大模型与搜索 API Key。' },
  { href: 'reference.html',                 kind: 'workflow', name: '设计参考',               desc: '精修形态沉淀：原则 + 配色 token + 实体卡两态 + 核心组件。' },
];
const READS = [
  { href: 'PHILOSOPHY.md',   kind: 'sparkle', name: 'PHILOSOPHY.md',   desc: '产品哲学：海与岛、信号交互、Apple 化 B 端视觉、四导航。' },
  { href: 'CONTRIBUTING.md', kind: 'agent',   name: 'CONTRIBUTING.md', desc: '并发协作约定：主人地图 + 共享契约 + 加海洋套路（多 AI 不打架）。' },
  { href: 'README.md',       kind: 'docs',    name: 'README.md',       desc: '这个文件夹是什么、怎么看、和 Flutter 的关系。' },
];
const card = d => `<a class="demo" href="${d.href}"><div class="card">
    <div class="ch"><span class="ei etype ${d.kind}">${icon(d.kind, 16)}</span><b>${d.name}</b></div>
    <div class="desc">${d.desc}</div>
  </div></a>`;
document.getElementById('demos').innerHTML = DEMOS.map(card).join('');
document.getElementById('reads').innerHTML = READS.map(card).join('');
</script>
</body>
</html>
