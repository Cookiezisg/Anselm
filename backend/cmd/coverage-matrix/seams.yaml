# Cross-domain seams + lifecycle chains — handwritten registry consumed by the
# coverage-matrix tool. Each ID must match exactly one `// covers: cross:<id>` or
# `// covers: lifecycle:<id>` annotation in a pipeline test (otherwise the audit
# step flags "uncovered seam" or "orphan annotation").
#
# 跨 domain 锈川 + 长链路 — 手维注册表,工具消费。每个 ID 必须有恰好一条
# // covers: cross:<id> 或 // covers: lifecycle:<id> 注释对应(否则 audit 报错)。

cross:
  # chat × trinity (function/handler/workflow LLM tool 调用面)
  - id: chat_trinity:search_function
    description: chat 调 search_function tool 列函数(不写 execution_log)
  - id: chat_trinity:get_function
    description: chat 调 get_function tool 返完整 Function entity
  - id: chat_trinity:create_function
    description: chat 调 create_function:流式写 code → CreateDraft → AST 解析 → AcceptPending
  - id: chat_trinity:edit_function
    description: chat 调 edit_function:JSON Merge Patch → 新 pending
  - id: chat_trinity:revert_function
    description: chat 调 revert_function:回滚到历史版本
  - id: chat_trinity:delete_function
    description: chat 调 delete_function:软删 entity
  - id: chat_trinity:run_function
    description: chat 调 run_function:resolveAttachments → 真 sandbox 执行 → 写 execution_log(TriggeredBy=chat)
  - id: chat_trinity:search_function_executions
    description: chat 调 search_function_executions tool
  - id: chat_trinity:get_function_execution
    description: chat 调 get_function_execution tool
  - id: chat_trinity:search_handler
    description: chat 调 search_handler tool
  - id: chat_trinity:get_handler
    description: chat 调 get_handler tool
  - id: chat_trinity:create_handler
    description: chat 调 create_handler:流式 method spec
  - id: chat_trinity:edit_handler
    description: chat 调 edit_handler tool
  - id: chat_trinity:revert_handler
    description: chat 调 revert_handler tool
  - id: chat_trinity:delete_handler
    description: chat 调 delete_handler tool
  - id: chat_trinity:call_handler
    description: chat 调 call_handler tool → record handler_call(TriggeredBy=chat)
  - id: chat_trinity:update_handler_config
    description: chat 调 update_handler_config tool
  - id: chat_trinity:search_handler_calls
    description: chat 调 search_handler_calls tool
  - id: chat_trinity:get_handler_call
    description: chat 调 get_handler_call tool
  - id: chat_trinity:search_workflow
    description: chat 调 search_workflow tool
  - id: chat_trinity:get_workflow
    description: chat 调 get_workflow tool
  - id: chat_trinity:create_workflow
    description: chat 调 create_workflow tool
  - id: chat_trinity:edit_workflow
    description: chat 调 edit_workflow tool
  - id: chat_trinity:revert_workflow
    description: chat 调 revert_workflow tool
  - id: chat_trinity:delete_workflow
    description: chat 调 delete_workflow tool
  - id: chat_trinity:trigger_workflow
    description: chat 调 trigger_workflow tool(dryRun 接 scheduler)
  - id: chat_trinity:search_workflow_executions
    description: chat 调 search_workflow_executions tool
  - id: chat_trinity:get_workflow_execution
    description: chat 调 get_workflow_execution tool

  # workflow × scheduler (execution plane)
  - id: workflow_scheduler:trigger_full_dag
    description: workflow trigger → 完整 DAG 拓扑执行 → flowrun status=completed
  - id: workflow_scheduler:approval_pause_resume
    description: approval node → pause → 人审批 → resume → completed
  - id: workflow_scheduler:loop_iterates_body
    description: loop node 反复执行 body 子图
  - id: workflow_scheduler:parallel_branches
    description: parallel node 各分支并行执行
  - id: workflow_scheduler:cancel_run
    description: DELETE /flowruns/{id} → 节点状态 cancelled
  - id: workflow_scheduler:variable_expression
    description: variable node 表达式求值 + Go template
  - id: workflow_scheduler:retry_up_to_max
    description: 失败 node 按配置重试上限
  - id: workflow_scheduler:timeout_status
    description: node 超时 → 状态 timeout
  - id: workflow_scheduler:rehydrate_on_boot
    description: 启动期把 DB 中 paused flowrun 重新挂回 scheduler

  # @-mention × document
  - id: mention_document:single_doc_snapshot
    description: 单 doc @mention → 快照入 message attrs
  - id: mention_document:nonexistent_rejected
    description: 不存在 doc 引用 → 请求拒绝
  - id: mention_document:trinity_entity_snapshot
    description: "@mention function/handler/workflow → 快照其当前状态"
  - id: mention_document:multi_doc_all_snapshotted
    description: 多个 doc @mention 都被快照

  # catalog 一致性
  - id: catalog_consistency:function_registers
    description: function 创建 → 出现在 catalog.Get
  - id: catalog_consistency:handler_registers
    description: handler 创建 → 出现在 catalog.Get
  - id: catalog_consistency:skill_registers
    description: skill scan 后 → 出现在 catalog.Get
  - id: catalog_consistency:mcp_registers
    description: mcp server add 后 → 出现在 catalog.Get
  - id: catalog_consistency:deleted_removed
    description: 删除 entity → 从 catalog 移除

  # subagent
  - id: subagent:explore_terminates
    description: Explore subagent 跑完终止 + 返 final text
  - id: subagent:plan_terminates
    description: Plan subagent 跑完终止
  - id: subagent:general_purpose_terminates
    description: general-purpose subagent 跑完终止
  - id: subagent:nested_spawn_suppressed
    description: subagent 内 spawn subagent(depth>=1)→ 抑制
  - id: subagent:timeout_5min_cap
    description: subagent 5min total-timeout 触发

  # isolation
  - id: isolation:cannot_list_other_user
    description: user2 List 看不到 user1 的资源
  - id: isolation:cannot_get_other_conv
    description: user2 GET user1 conv → 404
  - id: isolation:cannot_delete_other_apikey
    description: user2 DELETE user1 apikey → 404
  - id: isolation:cannot_approve_other_flowrun
    description: user2 approve user1 flowrun node → 404
  - id: isolation:sql_injection_sanitized
    description: query param SQL injection 被 sanitize

  # compaction × memory
  - id: compaction_memory:soft_downgrades_old
    description: token 软上限触发 → 老 tool_result 降到 warm/cold
  - id: compaction_memory:hard_summary_archives
    description: token 硬上限触发 → 生成 anchored-merge 摘要并 archive
  - id: memory:pinned_in_system_prompt
    description: pinned memory 全文进 system prompt
  - id: memory:read_tool_returns
    description: read_memory tool 返 memory 内容
  - id: memory:forget_tombstone
    description: forget_memory tool 后 list 不可见

  # askai (iterate / triage)
  - id: askai:iterate_function
    description: function :iterate action → 生 chat with function context
  - id: askai:iterate_handler
    description: handler :iterate action → 生 chat with handler context
  - id: askai:iterate_workflow
    description: workflow :iterate action → 生 chat with workflow context
  - id: askai:iterate_document
    description: document :iterate action → 生 chat with document context
  - id: askai:triage_flowrun
    description: flowrun :triage action → 生 chat with run context

  # eventlog 协议保证
  - id: eventlog:seq_monotonic
    description: seq 跨 message 严格单调递增
  - id: eventlog:parent_id_no_dangle
    description: parentBlockId 永不指向不存在的 block
  - id: eventlog:status_one_way
    description: block.status 单向流转(streaming → completed/error/cancelled)
  - id: eventlog:last_event_id_reconnect
    description: Last-Event-ID 重连 → 从指定 seq 续传
  - id: eventlog:seq_too_old_410
    description: 请求过老 seq → 410 SEQ_TOO_OLD

  # relation 自动同步
  - id: relation:create_function_edge
    description: 创 function → 插 conversation_forged_entity 边
  - id: relation:workflow_uses_edges
    description: 编辑 workflow 引用 function/handler → 插 workflow_uses_* 边
  - id: relation:document_links_edge
    description: document 内引用 entity → 插 document_links_entity 边
  - id: relation:delete_purges
    description: 删 entity → 清相关边

  # tool framework
  - id: tool_framework:permission_plan_mode
    description: plan_mode 下 destructive tool 调用被拒
  - id: tool_framework:needs_read_first
    description: NeedsReadFirst 保护:未先 Read 直接 Write 被拒
  - id: tool_framework:standard_fields_strip
    description: summary/destructive/execution_group 标准字段在 Execute 前剥除
  - id: tool_framework:execution_group_serial
    description: 不同 execution_group 按升序串行;同 group 并行

lifecycle:
  # function env 全生命周期
  - id: function_env:draft_to_accept_to_ready
    description: draft → fake LLM stream code → AST 解析 → AcceptPending → uv sync → ready
  - id: function_env:deps_parse_failure
    description: deps 错(uv 解析失败)→ EnvStatus=failed + EnvError 含 stderr
  - id: function_env:lru_n3_eviction
    description: N=3 LRU:第 4 个 EnvID 上线时淘汰最旧
  - id: function_env:revert_evicted_rebuild
    description: revert 到 evicted 版本 → 触发重新 sync
  - id: function_env:delete_destroys_envs
    description: 软删 function → 清整 function 目录(所有 envs)
  - id: function_env:multi_package_import
    description: 多 pip 包 import → env 激活成功

  # handler config 状态机
  - id: handler_config:unconfigured_to_ready
    description: unconfigured → AssembleClass → partially_configured → UpdateConfig → ready
  - id: handler_config:live_instance_init
    description: live instance attach → init args 校验
  - id: handler_config:call_serialized
    description: per-instance 调用串行(sync.Mutex)
  - id: handler_config:instance_crash_recovery
    description: instance 崩溃 → 下次 call 重建
  - id: handler_config:config_clear_reverts
    description: Config Clear → 撤回 live instances

  # workflow DAG 全节点
  - id: workflow_dag:13_node_types_smoke
    description: 13 种节点类型每种 1 例进入 / 1 例 cancel
  - id: workflow_dag:retry_then_fatal
    description: 重试上限后 → flowrun status=failed
  - id: workflow_dag:pause_resume
    description: paused state 序列化进 DB / resume 恢复 ExecutionContext
  - id: workflow_dag:timeout
    description: node 超时 + 内部 retry 链
  - id: workflow_dag:nested_container
    description: loop/parallel/approval container body 嵌套 ≤3 层
  - id: workflow_dag:rehydrate_on_boot
    description: 启动期 paused flowrun 从 DB 重挂

  # sandbox bootstrap
  - id: sandbox_bootstrap:mise_embed_unpacks
    description: 启动期 mise binary 从 go:embed 解压
  - id: sandbox_bootstrap:bootstrap_idempotent
    description: bootstrap 重复调用幂等
  - id: sandbox_bootstrap:destroy_env
    description: DestroyEnv 清单个 env 目录
