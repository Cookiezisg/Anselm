<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anselm flow-graph · 工作流图模块（生产级 demo）</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <div class="bar">
    <h1>Anselm flow-graph <span>· 工作流图模块</span></h1>
    <select class="sel" id="sample" title="示例图"></select>
    <div class="grp lbl" data-l="模式">
      <button class="seg on" data-mode="edit">编辑器</button>
      <button class="seg" data-mode="run">运行态</button>
    </div>
    <div class="grp lbl" data-l="方向">
      <button class="seg on" data-dir="LR">横向</button>
      <button class="seg" data-dir="TB">竖向</button>
    </div>
    <span class="spacer"></span>
    <span id="add-wrap"><button class="btn" id="add-menu-btn">＋ 节点 ▾</button><div id="add-menu"></div></span>
    <button class="btn danger" id="del-btn" title="删除选中（Del）">删除</button>
    <button class="btn" id="relayout" title="自动规范化（重排）">↻ 规范化</button>
    <button class="btn" id="undo" title="撤销（⌘Z）" disabled>↶</button>
    <button class="btn" id="redo" title="重做（⌘⇧Z）" disabled>↷</button>
    <button class="btn" id="ops-btn" title="后端 ops 日志">ops</button>
    <button class="btn" id="theme" title="主题">◐</button>
  </div>

  <div class="stage" id="stage">
    <div class="note" id="note"></div>
    <div id="minimap"></div>
    <div class="zoombar">
      <button class="btn" id="zout" title="缩小">－</button>
      <button class="btn" id="zfit" title="适应">适应</button>
      <button class="btn" id="zin" title="放大">＋</button>
    </div>
    <div class="legend" id="legend"></div>
    <div id="opslog"><div class="ops-h">后端 ops <span>workflow :edit 流</span></div><div class="ops-body"></div></div>
    <aside class="insp" id="inspector">
      <div class="ih"><span class="ttl" id="ins-ttl">节点</span><button class="x" onclick="document.getElementById('inspector').classList.remove('open')">×</button></div>
      <div class="ib" id="ins-body"></div>
    </aside>
    <div class="foot">悬停节点露连接桩拖拽连线 · 点节点/边右侧编辑 · 拖拽平移 · 滚轮缩放 · Del 删除 · ⌘Z 撤销</div>
    <div id="toast"></div>
  </div>
</div>

<script src="src/model.js"></script>
<script src="src/flowgraph.js"></script>
<script src="src/app.js"></script>
</body>
</html>
