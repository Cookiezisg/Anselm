# Anselm 工具链（mise 管理，替代 devbox/nix）。
# 进入仓库目录自动激活,go/flutter/dart 直接上 PATH——无 `devbox run` 包裹。
# 版本钉死保证换机一致;装的是真·可写官方 SDK(nix 只读 store 构建不了 macOS app)。
# 升级:改下方版本号 → `mise install`。
[tools]
go = "1.25"
flutter = "3.41.9"
# demo 的 Playwright 测试也属仓库门禁，故 Node 不再依赖开发机全局版本。
# 24.18.0 是当前 LTS（Krypton），适合生产/长期维护。
node = "24.18.0"
