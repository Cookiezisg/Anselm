<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <!--
      Local-first privacy lockdown: everything is inlined (single-file), nothing is remote.
      connect-src 'none' guarantees the editor can never exfiltrate document contents over the network.
      'unsafe-inline' is required because the whole app is one inlined file (no nonce pipeline); that's an
      acceptable trade for a fully-offline, no-remote-origin bundle. img-src widened when images land.
      本地优先隐私锁死:全内联、无远程;connect-src none 保证编辑器无法外泄文档。
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data: blob:; font-src data:; connect-src 'none'"
    />
    <title>Anselm 文档编辑器</title>
  </head>
  <body>
    <!-- The single co-scroll container: the doc header + the editor body scroll together. -->
    <div id="scroll">
      <header id="doc-header" class="an-col">
        <div id="doc-crumb"></div>
        <div id="doc-title" contenteditable="true" data-placeholder="无标题" spellcheck="false"></div>
        <div id="doc-desc" contenteditable="true" data-placeholder="添加描述…" spellcheck="false"></div>
        <div id="doc-tags"></div>
      </header>
      <div id="app" class="an-col"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
