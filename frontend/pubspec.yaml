name: anselm
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  dio: ^5.9.2
  fast_immutable_collections: ^11.2.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  json_annotation: ^4.12.0
  lucide_icons_flutter: ^3.1.14+2
  shared_preferences: ^2.5.5
  slang: ^4.16.0
  slang_flutter: ^4.16.0
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
  # Bundled UI font — MiSans (the demo's first-choice family), a variable font covering Latin
  # AND Simplified Chinese in one face, so the bilingual UI renders deterministically on every
  # platform (no dependence on what's installed). One VF file carries all weights; the engine
  # maps TextStyle.fontWeight onto its `wght` axis. See core/design/typography.dart.
  # 打包 UI 字体——MiSans(demo 首选),变量字体,一套覆盖 Latin+简体中文,双语 UI 全平台确定渲染(不靠机器装了什么)。
  fonts:
    - family: MiSans
      fonts:
        - asset: assets/fonts/MiSansVF.ttf
