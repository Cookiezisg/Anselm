name: anselm
description: "Anselm — local-first agentic workflow platform · Flutter desktop client."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  # Assembly-root state container (classic Riverpod, not codegen — see ADR 0004).
  flutter_riverpod: ^3.3.2
  # Window GEOMETRY (size / min / center / resize) — the purpose-built desktop package; handles
  # the Retina scale factor + live resize correctly. 窗口尺寸/最小/居中/缩放(scale 正确)。
  window_manager: ^0.5.1
  # macOS window CHROME only — frameless titlebar + taller titlebar (clickable centered traffic
  # lights). Best-practice package, NOT hand-rolled (原则 #8). Sizing is window_manager's job.
  # 仅 macOS 窗口外观:无边框 + 加高标题栏(灯居中可点)。尺寸归 window_manager。
  macos_window_utils: ^1.5.0
  # In-app UI zoom (Cmd +/-): scales the WHOLE UI reflow-correct (browser-style) by overriding
  # the binding's view config — not Transform.scale / textScaler. 应内 UI 缩放(整体重排式)。
  scaled_app: ^2.3.1
  # Lightweight key/value persistence (zoom level, window prefs). 轻量持久化(缩放档/窗口偏好)。
  shared_preferences: ^2.5.0
  # UI glyphs — the whole Lucide set as IconData. The demo vendors the same set; we use the
  # maintained package rather than re-vendoring (原则 #8). Semantic alias map = core/ui/icons.dart.
  # UI 图标=整组 Lucide;用成熟包而非重新 vendored,语义别名表在 core/ui/icons.dart。
  lucide_icons_flutter: ^3.1.14+2
  # LLM-output markdown renderer with the richest builder surface (codeBuilder / highlightBuilder /
  # imageBuilder / tableBuilder / onLinkTap / swappable components) — used ONLY through the AnMarkdown
  # facade (core/ui), never raw. PINNED EXACT: upstream has broken builder signatures within a minor
  # before; the facade keeps us vendorable if it stalls. LLM 输出 markdown 渲染器,builder 钩子面最全;
  # 仅经 AnMarkdown 门面用、绝不裸用。钉死精确版本(上游曾在小版本内破坏 builder 签名;门面保可 vendor)。
  gpt_markdown: 1.1.7
  # Vector rendering for the bundled brand mark (assets/brand) + inline provider SVGs (currentColor).
  # 矢量渲染:品牌标 + 内联 provider SVG(随 ink 着色)。
  flutter_svg: ^2.3.0
  # i18n — slang: type-safe `context.t.<key>` from lib/i18n/*.i18n.json. NO hardcoded CN/EN in code
  # (CLAUDE.md 前端守则). Generated via `dart run slang` (NOT build_runner — avoids the asset clash).
  # i18n=slang:类型安全 t.<key>,严禁硬编码中英文;`dart run slang` 生成(不走 build_runner)。
  slang: ^4.16.0
  slang_flutter: ^4.16.0
  # HTTP transport (REST ApiClient) + the long-lived SSE GET (ResponseType.stream). The one
  # runtime dep the net + sse layers need. 网络传输:REST + 长连 SSE(均走 dio 流)。
  dio: ^5.9.2
  # Contract DTO codegen runtime annotations (@freezed / @Default / @JsonKey unknownEnumValue).
  # 契约 DTO codegen 运行时注解(freezed 3.x + json 联合体 unknown 兜底)。
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  # Declarative desktop routing (AppShell + feature routes). 声明式路由(壳 + feature 路由)。
  go_router: ^17.3.0
  characters: ^1.4.1
  file_selector: ^1.1.0
  pasteboard: ^0.5.0
  desktop_drop: ^0.7.1
  mime: ^2.0.0
  flutter_local_notifications: ^22.0.1
  webview_flutter: ^4.14.0
  # Native document editor (the pivot off Milkdown-in-webview — a webview can only CSS-approximate the
  # An primitives, never pixel-match them; super_editor renders every block as a REAL Flutter widget so
  # each element is drawn with our own An widgets/tokens = true 1:1). PINNED EXACT: the dev channel has
  # no semver, a caret would jump; companions (super_text_layout/attributed_text/overlord/follow_the_leader)
  # come transitively. Used ONLY through a facade (原则 #8). Markdown codec (super_editor_markdown) is
  # deferred — it lags the main package (<dev.40); we add it (pinned) or write our own when we wire the
  # documents feature. 原生编辑器,钉死 dev 版;仅经门面用;markdown 编解码后置。
  # dev.52 (2026-06-11) targets a Flutter newer than the project's 3.41.9 (uses TextInputConnection.
  # updateStyle absent here) → pinned dev.51 (2026-03-27, pre-dates our Flutter) = newest compatible.
  # dev.41+ 引用了本项目 Flutter 3.41.9 没有的 TextInputConnection.updateStyle → 钉 dev.40(旧码同版、本 Flutter 上已验证可编)。
  super_editor: 0.3.0-dev.40
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Deterministic virtual clock for timer/debounce tests (no real waits). 定时器/防抖测试的确定性虚拟时钟。
  fake_async: ^1.3.0
  # Codegen for contract DTOs (NOT slang — slang stays on its own `dart run slang`, see build.yaml).
  # 契约 DTO 代码生成(不含 slang——slang 自走 dart run slang,见 build.yaml)。
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  # WidgetTester extensions from Flutter Bounty Hunters (same authors as super_editor) — ime.typeText,
  # pressEnter/pressBackspace, doubleTapInParagraph/tripleTapInParagraph — for the editor interaction
  # test matrix (Layer 1). Real IME/CJK composition still can't be automated (Flutter #131510 → manual).
  # super_editor 同源测试扩展:打字/双三击等交互 widget-test;真 CJK 组字仍须真机(#131510)。
  flutter_test_robots: ^0.0.24
  # super_editor's text-layout companion (transitively resolved) — pinned explicit ONLY so tests can
  # reach BlinkController.indeterminateAnimationsEnabled (super_editor's barrel `show`-excludes it) to
  # halt the caret ticker, or pumpAndSettle hangs on the infinite blink. 测试关光标 ticker 用。
  super_text_layout: 0.1.21

flutter:
  uses-material-design: true
  # Bundled brand mark — the app icon SVG (pixel-F squircle), rendered in-UI by AnBrandIcon.
  # 随包品牌标——app 图标 SVG,AnBrandIcon 在 UI 内渲染。
  assets:
    - assets/brand/
    # The document editor — a self-contained offline Milkdown/Crepe WYSIWYG-markdown bundle loaded into
    # a WKWebView by AnDocEditor. Source of truth = tool/doc-editor/ (built via `make doc-editor`).
    # 文档编辑器离线单文件包(WKWebView 加载);源在 tool/doc-editor/,`make doc-editor` 重建。
    - assets/editor/doc_editor.html
    # Bundled fonts, ALSO injected into the editor webview at runtime over the bridge (@font-face) so
    # CJK renders in MiSans 1:1 with the app. 字体亦经桥注入编辑器 webview,CJK 与产品一致。
    - assets/fonts/
  # Bundled fonts so the bilingual UI + code render deterministically on every machine (no drift
  # from whatever is installed). MiSans VF = UI face (Latin + Simplified Chinese); JetBrains Mono =
  # code face. Both variable. See core/design/typography.dart.
  # 随包字体,每台机器渲染同一字面:MiSans VF=UI(Latin+简中);JetBrains Mono=代码。皆变量字体。
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/InterVariable.ttf
    - family: MiSans
      fonts:
        - asset: assets/fonts/MiSansVF.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
